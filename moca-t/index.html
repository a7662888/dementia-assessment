<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MoCA 台灣版｜台語施測（一題一頁）</title>
<style>
  :root{--ink:#1c2b33;--paper:#faf9f6;--card:#fff;--line:#e3ded4;--accent:#0f766e;
        --accent-soft:#e6f2f0;--muted:#6b7280;--guo:#33506b;--warn:#b45309;--err:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--paper);color:var(--ink);
       display:flex;flex-direction:column;overflow:hidden;}
  /* 頂列 */
  .top{background:var(--ink);color:#e8e4da;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .top .t{font-weight:700;font-size:.95rem;white-space:nowrap;}
  .top .bar{flex:1;height:6px;background:#3a4c55;border-radius:3px;overflow:hidden;}
  .top .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s;}
  .top .n{font-size:.8rem;color:#9fb3ad;white-space:nowrap;}
  /* 頁面容器 */
  #stage{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .page{display:none;max-width:760px;margin:0 auto;padding:20px 16px 30px;animation:fade .25s;}
  .page.on{display:block;}
  @keyframes fade{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:none;}}
  h2{font-size:1.3rem;color:var(--accent);margin-bottom:4px;}
  .pts{font-size:.82rem;color:var(--muted);margin-bottom:12px;}
  .guo{color:var(--guo);font-size:.85rem;background:#f2f5f8;border-left:3px solid var(--guo);
       padding:7px 12px;margin:10px 0;border-radius:0 4px 4px 0;}
  .clipbox{border:1px solid var(--line);border-radius:8px;margin:12px 0;background:var(--card);overflow:hidden;}
  .clipbox .head{background:var(--accent-soft);padding:7px 12px;font-size:.8rem;color:var(--accent);
                 font-weight:700;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
  .clipbox .tai{font-size:1.1rem;font-weight:700;padding:12px 14px 2px;line-height:1.8;}
  .clipbox .kip{font-family:Georgia,serif;color:var(--accent);font-size:.9rem;padding:2px 14px 10px;line-height:1.6;}
  .clipbox details{font-size:.8rem;color:var(--muted);padding:0 14px 10px;}
  .clipbox summary{cursor:pointer;}
  .player button, .stim button{border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:6px;
    padding:6px 14px;font-size:.85rem;cursor:pointer;font-family:inherit;}
  .player button:active,.stim button:active{background:var(--accent);color:#fff;}
  .player button.slow{border-style:dashed;}
  .stim{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:12px 0;}
  .stim .lab{font-size:.8rem;color:var(--warn);font-weight:700;margin-bottom:6px;}
  .stim .seq{font-size:1.5rem;font-weight:700;letter-spacing:.4em;overflow-wrap:anywhere;line-height:1.7;}
  .stim .seq.small{font-size:1.05rem;letter-spacing:.22em;}
  .note{font-size:.8rem;color:var(--muted);margin:8px 0;}
  /* 計分 */
  .score{background:var(--card);border:2px solid var(--accent);border-radius:8px;padding:12px 14px;margin:14px 0;}
  .score .lab{font-size:.85rem;font-weight:700;color:var(--accent);margin-bottom:8px;}
  .score label{display:flex;align-items:center;gap:10px;padding:7px 4px;font-size:.98rem;cursor:pointer;border-bottom:1px dashed var(--line);}
  .score label:last-child{border-bottom:none;}
  .score input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent);flex-shrink:0;}
  .score .sub{font-size:.78rem;color:var(--muted);}
  .got{font-weight:700;color:var(--accent);}
  /* canvas */
  .canv{border:2px solid var(--line);border-radius:8px;background:#fff;touch-action:none;display:block;width:100%;}
  .canvbar{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;}
  .canvbar button{border:1px solid var(--muted);background:#fff;border-radius:6px;padding:6px 14px;font-size:.85rem;cursor:pointer;font-family:inherit;}
  .visrow{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;}
  .animals{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:12px 0;}
  .animals figure{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px;text-align:center;}
  .animals img{max-width:100%;height:auto;}
  .animals figcaption{font-size:.85rem;color:var(--muted);margin-top:6px;}
  table.simple{border-collapse:collapse;width:100%;margin:10px 0;font-size:.85rem;background:#fff;}
  table.simple th,table.simple td{border:1px solid var(--line);padding:6px 8px;text-align:left;}
  table.simple th{background:var(--accent-soft);color:var(--accent);}
  .memgrid{display:grid;grid-template-columns:6.5em repeat(5,1fr);gap:4px;margin:10px 0;font-size:.85rem;}
  .memgrid .h{font-weight:700;background:var(--accent-soft);color:var(--accent);padding:6px 4px;text-align:center;border-radius:4px;}
  .memgrid .r{padding:6px 4px;display:flex;align-items:center;font-weight:700;}
  .memgrid label{background:#fff;border:1px solid var(--line);border-radius:4px;display:flex;justify-content:center;align-items:center;padding:6px 2px;gap:4px;}
  .memgrid input{width:18px;height:18px;accent-color:var(--accent);}
  /* 計時器 */
  .timerbox{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;margin:12px 0;}
  .timerbox .clock{font-size:2.4rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent);min-width:2.2em;}
  .timerbox button{border:1px solid var(--accent);background:#fff;color:var(--accent);border-radius:6px;padding:10px 18px;font-size:1rem;cursor:pointer;font-family:inherit;}
  .timerbox button.big{font-size:1.15rem;padding:14px 22px;}
  /* trail svg */
  #trailSvg{width:100%;max-width:560px;display:block;margin:8px auto;touch-action:manipulation;}
  #trailSvg circle{fill:#fff;stroke:var(--ink);stroke-width:2.5;cursor:pointer;}
  #trailSvg g.done circle{fill:var(--accent-soft);stroke:var(--accent);}
  #trailSvg g.err circle{stroke:var(--err);fill:#fdeceb;}
  #trailSvg text{font-size:22px;font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
  #trailSvg .lbl{font-size:14px;fill:var(--muted);font-weight:400;}
  #trailSvg line{stroke:var(--accent);stroke-width:2.5;stroke-dasharray:6 5;marker-end:url(#arr);}
  /* 表單 */
  .form label{display:block;margin:14px 0 4px;font-weight:700;font-size:.95rem;}
  .form input,.form select{width:100%;padding:12px;font-size:1.05rem;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:#fff;}
  .form .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  /* 底部導覽 */
  .navbar{flex-shrink:0;display:flex;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--line);}
  .navbar button{flex:1;padding:14px;font-size:1.05rem;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;font-family:inherit;}
  .navbar button.next{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;flex:2;}
  .navbar button:disabled{opacity:.4;}
  /* 結果 */
  .res th,.res td{text-align:center;}
  .res td.name{text-align:left;font-weight:700;}
  .badge{display:inline-block;background:var(--accent);color:#fff;border-radius:20px;padding:2px 12px;font-size:.9rem;}
  footer{font-size:.72rem;color:var(--muted);line-height:1.8;margin-top:20px;border-top:1px solid var(--line);padding-top:10px;}
  .startbtn{display:block;width:100%;margin-top:22px;padding:16px;font-size:1.2rem;font-weight:700;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;}
  .warnbox{background:#fdf6ec;border:1px solid #ecd9b0;border-radius:8px;padding:10px 14px;font-size:.82rem;color:var(--warn);margin:12px 0;}
  /* ---------- 列印報告 ---------- */
  #printReport{display:none;}
  @media print{
    body > *:not(#printReport){display:none !important;}
    body{overflow:visible;display:block;background:#fff;}
    #printReport{display:block !important;font-size:11pt;color:#1c2b33;padding:0;max-width:none;}
  }
  #printReport .rp-head{border-bottom:3px solid var(--accent);padding-bottom:8px;margin-bottom:12px;}
  #printReport h1{font-size:16pt;color:var(--accent);margin-bottom:2px;}
  #printReport .rp-sub{font-size:9pt;color:#555;}
  #printReport .rp-demo{display:flex;gap:22px;flex-wrap:wrap;font-size:10.5pt;margin:10px 0;}
  #printReport .rp-demo b{color:var(--accent);}
  #printReport table{border-collapse:collapse;width:100%;margin:8px 0;font-size:10pt;}
  #printReport th,#printReport td{border:1px solid #bbb;padding:4px 8px;text-align:center;}
  #printReport th{background:#e6f2f0;color:#0f766e;}
  #printReport td.name{text-align:left;font-weight:700;}
  #printReport .rp-total{font-size:13pt;margin:8px 0;}
  #printReport .rp-total b{color:var(--accent);font-size:16pt;}
  #printReport .rp-draws{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;page-break-inside:avoid;}
  #printReport .rp-draws figure{border:1px solid #bbb;border-radius:6px;padding:6px;text-align:center;}
  #printReport .rp-draws img{width:250px;height:auto;background:#fff;}
  #printReport .rp-draws figcaption{font-size:9pt;color:#555;margin-top:2px;}
  #printReport .rp-notes{font-size:9pt;color:#555;line-height:1.7;margin-top:10px;border-top:1px solid #bbb;padding-top:6px;}
  #printReport .rp-sign{margin-top:22px;font-size:10.5pt;display:flex;gap:60px;}
</style>
</head>
<body>
<div class="top"><span class="t">MoCA-T 台語施測</span><div class="bar"><i id="pbar"></i></div><span class="n" id="pnum"></span></div>
<div id="stage"></div>
<div class="navbar">
  <button id="btnPrev">上一題</button>
  <button id="btnNext" class="next">下一題 ›</button>
</div>

<script>
const CLIPS = {"trail": {"id": "trail", "section": "1. 交替轉換測試", "taigi_original": "請恁繪一條線，順序對一咧數字夠另外一咧國字，位這個所在開始，由「1」連夠「甲」，然後夠「2」，照按內繪下去，最後停置ㄟ【終點】。", "taigi_moe": "請恁畫一條線，照順序對一个數字到另外一个國字，對這个所在開始，由「1」連到「甲」，然後到「2」，照按呢畫落去，最後停佇【終點】。", "kip": "tshiánn lín uē tsi̍t tiâu suànn,tsiàu sūn-sū tuì tsi̍t-ê sòo-jī kàu līng-guā tsi̍t-ê kok-jī,tuì tsit-ê sóo-tsāi khai-sí,iû“1”liân kàu“kah”,jiân-āu kàu“2\",tsiàu án-ne uē lo̍h-khì,tsuè-āu thîng tī【tsiong-tiám】.", "ok": true, "warnings": ["「呢」（台語少用「呢」）"], "mp3": "trail.mp3"}, "cube": {"id": "cube", "section": "2. 視覺空間建構（一）立方體", "taigi_original": "請恁照這仔圖，置下面空白ㄟ所在，繪一咧同款ㄟ，嚕成嚕好。", "taigi_moe": "請恁照這个圖，佇下跤空白的所在，畫一个仝款的，愈成愈好。", "kip": "tshiánn lín tsiàu tsit-ê tôo,tī ē-kha khàng-pe̍h ê sóo-tsāi,uē tsi̍t-ê kāng-khuán ê,jú sîng jú hó.", "ok": true, "warnings": [], "mp3": "cube.mp3"}, "clock": {"id": "clock", "section": "3. 視覺空間建構（二）時鐘", "taigi_original": "請恁繪一咧時鐘，將所有ㄟ數字攏愛畫落去，而且將時間畫作十一點十分。", "taigi_moe": "請恁畫一个時鐘，所有的數字攏愛畫落去，而且將時間畫做十一點十分。", "kip": "tshiánn lín uē tsi̍t-ê sî-tsing,sóo-ū ê sòo-jī lóng-ài uē lo̍h-khì,jî-tshiánn tsiong sî-kan uē-tsò tsa̍p tsi̍t-tiám tsa̍p-hun.", "ok": true, "warnings": [], "mp3": "clock.mp3"}, "naming": {"id": "naming", "section": "4. 命名", "taigi_original": "請講出這隻動物ㄟ名。", "taigi_moe": "請講出這隻動物的名。", "kip": "tshiánn kóng-tshut tsit tsiah tōng-bu̍t ê miâ.", "ok": true, "warnings": [], "mp3": "naming.mp3"}, "mem1": {"id": "mem1", "section": "5. 記憶（第一次）", "taigi_original": "我想買了解恁ㄟ記憶按怎，等咧我會念幾個物件，請恁注意聽，要記起來。等我念完，請恁盡量甲恁ㄟ記ㄟ物件講乎我聽，唔免照順序唔要緊。", "taigi_moe": "我想欲了解恁的記持按怎，等咧我會唸幾个物件，請恁注意聽，愛記起來。等我唸煞，請恁盡量共恁會記得的物件講予我聽，毋免照順序無要緊。", "kip": "Guá siūnn-beh liáu-kái lín ê kì-tî án-tsuánn,tán leh guá ē liām kuí-ê mi̍h-kiānn,tshiánn lín tsù-ì thiann,ài kì khí-lâi.Tán guá liām suah,tshiánn lín tsīn-liōng kā lín ē-kì-tit ê mi̍h-kiānn kóng hōo guá thiann,m̄-bián tsiàu sūn-sū bô-iàu-kín.", "ok": true, "warnings": [], "mp3": "mem1.mp3"}, "mem2": {"id": "mem2", "section": "5. 記憶（第二次）", "taigi_original": "我擱念一擺，請恁盡量記起來，講乎我聽，嚕追嚕好。第一擺講過ㄟ嘛愛講。", "taigi_moe": "我閣唸一擺，請恁盡量記起來，講予我聽，愈濟愈好。第一擺講過的嘛愛講。", "kip": "guá koh liām tsi̍t-pái,tshiánn lín tsīn-liōng kì khí-lâi,kóng hōo guá thiann,jú tsē jú hó.tē tsi̍t-pái kóng-kuè ê mā ài kóng.", "ok": true, "warnings": [], "mp3": "mem2.mp3"}, "mem3": {"id": "mem3", "section": "5. 記憶（預告延遲回憶）", "taigi_original": "等咧我ㄟ擱問恁一擺，夠時請恁擱講出這幾ㄟ物件。", "taigi_moe": "等咧我會閣問恁一擺，到時請恁閣講出這幾个物件。", "kip": "tán leh guá ē koh mn̄g lín tsi̍t-pái,kàu-sî tshiánn lín koh kóng-tshut tsit kuí-ê mi̍h-kiānn.", "ok": true, "warnings": [], "mp3": "mem3.mp3"}, "digit_fwd": {"id": "digit_fwd", "section": "6. 專注力：數字順背", "taigi_original": "等一咧，我ㄟ念歸ㄟ數字，等我念了，請恁照我念ㄟ擱念一擺。", "taigi_moe": "等一下，我會唸幾个數字，等我唸了，請恁照我唸的閣唸一擺。", "kip": "Tán-tsi̍t-ē,guá ē liām kuí-ê sòo-jī,tán guá liām-liáu,tshiánn lín tsiàu guá liām ê koh liām tsi̍t-pái.", "ok": true, "warnings": [], "mp3": "digit_fwd.mp3"}, "digit_bwd": {"id": "digit_bwd", "section": "6. 專注力：數字倒背", "taigi_original": "這次我ㄟ念另外歸ㄟ數字，等我念了，恁要倒頭念乎我聽。", "taigi_moe": "這擺我會唸另外幾个數字，等我唸了，請恁倒頭唸予我聽。", "kip": "Tsit pái guá ē liām līng-guā kuí-ê sòo-jī,tán guá liām-liáu,tshiánn lín tò-thâu liām hōo guá thiann.", "ok": true, "warnings": [], "mp3": "digit_bwd.mp3"}, "vigilance": {"id": "vigilance", "section": "6. 專注力：警覺性", "taigi_original": "等咧我ㄟ念一寡數字，每一擺我念到「1」這咧數字ㄟ時陣，恁就啪桌仔一下，若是我念別ㄟ數字，就賣啪桌仔。", "taigi_moe": "等咧我會唸一寡數字，每一擺我唸著「1」這个數字的時陣，恁就拍桌仔一下；若是我唸別的數字，就莫拍桌仔。", "kip": "tán leh guá ē liām tsi̍t-kuá sòo-jī,muí tsi̍t-pái guá liām-tio̍h“1\"tsit-ê sòo-jī ê sî-tsūn,lín tō phah toh-á tsi̍t-ē;nā-sī guá liām pa̍t ê sòo-jī,tō mài phah toh-á.", "ok": true, "warnings": [], "mp3": "vigilance.mp3"}, "serial7": {"id": "serial7", "section": "6. 專注力：連續減七", "taigi_original": "請恁來算一個題目看脈，先用一百減七，然後擱減七，一直減落去，減甲我喊停為止。", "taigi_moe": "請恁來算一个題目看覓，先用一百減七，然後閣減七，一直減落去，減到我喝停為止。", "kip": "tshiánn lín lâi sǹg tsi̍t-ê tê-bo̍k khuànn-māi,sing iōng tsi̍t-pah kiám tshit,jiân-āu koh kiám tshit,it-ti̍t kiám lo̍h-khì,kiám kàu guá huah thîng uî-tsí.", "ok": true, "warnings": [], "mp3": "serial7.mp3"}, "rep1": {"id": "rep1", "section": "7. 重複句子（第一句）", "taigi_original": "我ㄟ念一句話乎恁聽，等我念了，請恁照我念ㄟ念一擺，盡量愛完全同款：我知影今日來幫忙ㄟ是蔡桑。", "taigi_moe": "我會唸一句話予恁聽，等我唸了，請恁照我唸的唸一擺，盡量愛完全仝款：我知影今仔日來幫忙的是蔡桑。", "kip": "guá ē liām tsi̍t-kù uē hōo lín thiann,tán guá liām-liáu,tshiánn lín tsiàu guá liām ê liām tsi̍t-pái,tsīn-liōng ài uân-tsuân kāng-khuán:Guá tsai-iánn kin-á-ji̍t lâi pang-bâng ê sī Tshuà-sáng.", "ok": true, "warnings": [], "mp3": "rep1.mp3"}, "rep2": {"id": "rep2", "section": "7. 重複句子（第二句）", "taigi_original": "現在我擱念另外一句，請恁照我念ㄟ念一擺：狗那置咧房間內，喵總是密置ㄟ桌仔腳。", "taigi_moe": "這馬我閣唸另外一句，請恁照我唸的唸一擺：狗若佇房間內，貓總是覕佇桌仔跤。", "kip": "tsit-má guá koh liām līng-guā tsi̍t-kù,tshiánn lín tsiàu guá liām ê liām tsi̍t-pái:káu nā tī pâng-king-lāi,niau tsóng-sī bih tī toh-á-kha.", "ok": true, "warnings": [], "mp3": "rep2.mp3"}, "fluency": {"id": "fluency", "section": "8. 語言流暢", "taigi_original": "恁有一分鐘ㄟ時間，請恁講一些面件乎我聽，嚕追嚕好。譬如我請恁講出一括花蕊ㄟ名，恁就可以講蓮花、菊花……準備好阿未？恁有一分鐘ㄟ時間，請盡量講出恁知樣ㄟ水果ㄟ名。", "taigi_moe": "恁有一分鐘的時間，請恁講一寡物件予我聽，愈濟愈好。譬如我請恁講出一寡花蕊的名，恁就會使講蓮花、菊花。準備好矣未？恁有一分鐘的時間，請盡量講出恁知影的水果的名。", "kip": "lín ū tsi̍t hun-tsing ê sî-kan,tshiánn lín kóng tsi̍t-kuá mi̍h-kiānn hōo guá thiann,jú tsē jú hó. ／ phì-jû guá tshiánn lín kóng-tshut tsi̍t-kuá hue-luí ê miâ,lín tō ē-sái kóng liân-hue,kiok-hue. ／ tsún-pī hó-ah-buē? ／ lín ū tsi̍t hun-tsing ê sî-kan,tshiánn tsīn-liōng kóng-tshut Lín tsai-iánn ê tsuí-kó ê miâ.", "ok": true, "warnings": [], "mp3": "fluency.mp3"}, "abs_ex1": {"id": "abs_ex1", "section": "9. 抽象概念（例題）", "taigi_original": "請恁講出柑仔和香蕉同款ㄟ所在。", "taigi_moe": "請恁講出柑仔佮弓蕉仝款的所在。", "kip": "tshiánn lín kóng-tshut kam-á kah king-tsio kāng-khuán ê sóo-tsāi.", "ok": true, "warnings": [], "mp3": "abs_ex1.mp3"}, "abs_ex2": {"id": "abs_ex2", "section": "9. 抽象概念（追問）", "taigi_original": "另外一方面來講，請講出這幾項面件叨幾方面是相同ㄟ。", "taigi_moe": "另外一方面來講，請講出這幾項物件佇佗一方面是相仝的。", "kip": "līng-guā tsi̍t-hong-bīn lâi-kóng,tshiánn kóng-tshut tse kuí-hāng mi̍h-kiānn tī tó tsi̍t-hong-bīn sī sio-kāng ê.", "ok": true, "warnings": [], "mp3": "abs_ex2.mp3"}, "abs_ex3": {"id": "abs_ex3", "section": "9. 抽象概念（示範答案）", "taigi_original": "它們攏是果籽。", "taigi_moe": "𪜶攏是果子。", "kip": "in lóng sī kué-tsí.", "ok": true, "warnings": [], "mp3": "abs_ex3.mp3"}, "abs_train": {"id": "abs_train", "section": "9. 抽象概念（正式一：火車－腳踏車）", "taigi_original": "現在，請甲我講，火車和腳踏車同款ㄟ所在是？它們攏是？", "taigi_moe": "這馬，請共我講，火車佮跤踏車仝款的所在是？𪜶攏是？", "kip": "Tsit-má,tshiánn kā guá kóng,hué-tshia kah kha-ta̍h-tshia kāng-khuán ê sóo-tsāi sī?in lóng sī?", "ok": true, "warnings": [], "mp3": "abs_train.mp3"}, "abs_watch": {"id": "abs_watch", "section": "9. 抽象概念（正式二：尺－手錶）", "taigi_original": "現在請講出尺與手錶同款ㄟ所在。", "taigi_moe": "這馬請講出尺佮手錶仝款的所在。", "kip": "Tsit-má tshiánn kóng-tshut tshioh kah tshiú-pió kāng-khuán ê sóo-tsāi.", "ok": true, "warnings": [], "mp3": "abs_watch.mp3"}, "recall": {"id": "recall", "section": "10. 延遲記憶", "taigi_original": "我之前有唸幾ㄟ物件乎恁聽，有請恁記起來。現在請恁講看嘜恁ㄟ記得ㄟ物件。", "taigi_moe": "我進前有唸幾个物件予恁聽，有請恁記起來。這馬請恁講看覓，恁會記得的物件。", "kip": "guá tsìn-tsîng ū liām kuí-ê mi̍h-kiānn hōo lín thiann,iú-tshiánn lín kì khí-lâi.Tsit-má tshiánn lín kóng-khuànn-māi,lín ē-kì-tit ê mi̍h-kiānn.", "ok": true, "warnings": [], "mp3": "recall.mp3"}, "recall_mc": {"id": "recall_mc", "section": "10. 延遲記憶（多選提示）", "taigi_original": "叨幾ㄟ字是恁感覺之前唸過ㄟ：「鼻仔」、「臉」、阿是「手」？", "taigi_moe": "佗一个詞是恁感覺進前唸過的：「鼻仔」、「面」、抑是「手」？", "kip": "tó-tsi̍t-ê sû sī lín kám-kak tsìn-tsîng liām kuè ê:“phīnn-á”,“bīn”,ia̍h-sī“Tshiú”?", "ok": true, "warnings": [], "mp3": "recall_mc.mp3"}, "ori_date": {"id": "ori_date", "section": "11. 定向（日期）", "taigi_original": "請講出今日ㄟ日期。", "taigi_moe": "請講出今仔日的日期。", "kip": "tshiánn kóng-tshut kin-á-ji̍t ê ji̍t-kî.", "ok": true, "warnings": [], "mp3": "ori_date.mp3"}, "ori_hint": {"id": "ori_hint", "section": "11. 定向（提示）", "taigi_original": "請講出「年、月、日、和禮拜幾」。", "taigi_moe": "請講出「年、月、日，佮禮拜幾」。", "kip": "tshiánn kóng-tshut“nî,gue̍h,ji̍t,kah lé pài-kuí”.", "ok": true, "warnings": [], "mp3": "ori_hint.mp3"}, "ori_place": {"id": "ori_place", "section": "11. 定向（地點）", "taigi_original": "請講出恁現在所在ㄟ地點和都市。", "taigi_moe": "請講出恁這馬所在的地點佮都市。", "kip": "tshiánn kóng-tshut lín ts /* ---------- 元件 ---------- */
function clipHTML(id, title){
  const c = CLIPS[id]; if (!c) return "";
  return `<div class="clipbox"><div class="head"><span>${title || "台語指導語"}</span>
    <span class="player"><button onclick="playClip('${id}',1)">▶ 播放</button>
    <button class="slow" onclick="playClip('${id}',0.75)">0.75×</button></span></div>
    <div class="tai">${c.taigi_moe}</div><div class="kip">${c.kip}</div>
    ${c.taigi_original ? `<details><summary>官方原文（民間式用字）</summary>${c.taigi_original}</details>` : ""}</div>`;
}
const players = {};
function playClip(id, rate){
  Object.values(players).forEach(p => p.pause());
  if (!players[id]) players[id] = new Audio("audio/" + CLIPS[id].mp3);
  const p = players[id]; p.currentTime = 0; p.playbackRate = rate; p.play();
}
function stimHTML(id, label, seq, small){
  return `<div class="stim"><div class="lab">${label}</div>
    <div class="seq${small ? " small" : ""}">${seq}</div>
    <button onclick="playClip('${id}',1)">▶ 以每秒一${small ? "字" : "詞"}播放</button></div>`;
}
function cb(id, text, sub){
  const ck = S.scores[id] ? "checked" : "";
  return `<label><input type="checkbox" ${ck} onchange="setScore('${id}', this.checked?1:0)">
          <span>${text}${sub ? ` <span class="sub">${sub}</span>` : ""}</span></label>`;
}
function setScore(id, v){ S.scores[id] = v; save(); updateNav(); }

/* ---------- 計分定義 ---------- */
const SCORE_DEFS = {
  trail: ["trail"],
  cube_auto: ["cube_c1","cube_c2","cube_c3","cube_c4"],
  clock: ["clock_contour","clock_num","clock_hand"],
  naming: ["name_lion","name_rhino","name_camel"],
  att: ["att_fwd","att_bwd","att_vig"],
  s7: ["s7_1","s7_2","s7_3","s7_4","s7_5"],
  lang: ["rep_1","rep_2","flu"],
  abs: ["abs_1","abs_2"],
  mem: ["rc_1","rc_2","rc_3","rc_4","rc_5"],
  ori: ["or_1","or_2","or_3","or_4","or_5","or_6"],
};
function sum(ids){ return ids.reduce((a,i)=>a+(S.scores[i]||0),0); }
function s7pts(){ const n = sum(SCORE_DEFS.s7); return n>=4?3:n>=2?2:n>=1?1:0; }
function cubePts(){ return sum(SCORE_DEFS.cube_auto)===4?1:0; }
function domains(){
  return {
    vs: (S.scores.trail||0)+cubePts()+sum(SCORE_DEFS.clock),
    naming: sum(SCORE_DEFS.naming),
    attention: sum(SCORE_DEFS.att)+s7pts(),
    language: sum(SCORE_DEFS.lang),
    abstract: sum(SCORE_DEFS.abs),
    memory: sum(SCORE_DEFS.mem),
    orientation: sum(SCORE_DEFS.ori),
  };
}
function updCube(){ const el=document.getElementById("cubeGot"); if(el) el.textContent=cubePts(); }
function updS7(){ const a=document.getElementById("s7n"),b=document.getElementById("s7got");
  if(a){a.textContent=sum(SCORE_DEFS.s7); b.textContent=s7pts();} }
const _setScore = setScore;
setScore = (id,v)=>{ _setScore(id,v); updCube(); updS7(); };

/* ---------- 常模 ---------- */
function normInv(p){ /* Acklam 反常態近似 */
  if (p<=0||p>=1) return NaN;
  const a=[-39.69683028665376,220.9460984245205,-275.9285104469687,138.3577518672690,-30.66479806614716,2.506628277459239],
        b=[-54.47609879822406,161.5858368580409,-155.6989798598866,66.80131188771972,-13.28068155288572],
        c=[-0.007784894002430293,-0.3223964580411365,-2.400758277161838,-2.549732539343734,4.374664141464968,2.938163982698783],
        d=[0.007784695709041462,0.3224671290700398,2.445134137142996,3.754408661907416],
        pl=0.02425;
  let q,r;
  if(p<pl){ q=Math.sqrt(-2*Math.log(p));
    return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
  if(p<=1-pl){ q=p-0.5; r=q*q;
    return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
  q=Math.sqrt(-2*Math.log(1-p));
  return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function lookupPR(adj, key){
  const th = NORM.thresholds[key], pr = NORM.percentile;
  let ans = null;
  for (let i=0;i<th.length;i++){ if (th[i] <= adj) ans = pr[i]; else break; }
  return ans;   // null = PR<1（N/A）
}
function normCalc(raw, age, edu, sex){
  const A = age-68.08, E = edu-11.19, G = sex-0.5;
  const adj = {
    total:       raw.total + 0.09*A - 0.142*E,
    vs:          raw.vs - 0.081*G + 0.019*A - 0.034*E,
    naming:      raw.naming - 0.109*G + 0.007*A - 0.023*E,
    attention:   raw.attention + 0.014*A - 0.022*E,
    language:    raw.language + 0.116*G + 0.019*A - 0.035*E,
    abstract:    raw.abstract + 0.096*A - 0.044*E,
    memory:      raw.memory + 0.028*A - 0.028*E,
    orientation: raw.orientation + 0.005*A - 0.008*E,
  };
  const out = {};
  for (const k in adj){
    const pr = lookupPR(adj[k], k);
    out[k] = { adj: adj[k], pr, z: pr===null ? null : normInv(pr/100) };
  }
  return out;
}

/* ---------- 結果頁 ---------- */
const DOM_LABEL = { total:"總分", vs:"視覺空間/執行", naming:"命名", attention:"專注力",
                    language:"語言", abstract:"抽象概念", memory:"延遲記憶", orientation:"定向" };
const DOM_MAX = { total:30, vs:5, naming:3, attention:6, language:3, abstract:2, memory:5, orientation:6 };
function renderResult(){
  const d = domains();
  const raw = {...d, total: Object.values(d).reduce((a,b)=>a+b,0)};
  const edu = parseFloat(S.demo.edu), age = parseFloat(S.demo.age), sex = parseFloat(S.demo.sex);
  const bonus = (!isNaN(edu) && edu<=12 && raw.total<30) ? 1 : 0;
  let h = `<p>原始總分 <span class="badge">${raw.total} / 30</span>
    ${bonus? `　傳統判讀加教育分：${raw.total}+1=<b>${raw.total+1}</b>` : ""}
    　<span class="note">傳統臨界值：≥26 為正常（教育≤12 年加 1 分後比較）。常模校正使用未加分之原始分數。</span></p>`;
  const okDemo = !isNaN(age)&&!isNaN(edu)&&!isNaN(sex);
  h += `<table class="simple res"><tr><th>領域</th><th>原始</th><th>校正(Adj)</th><th>PR</th><th>z</th></tr>`;
  const norm = okDemo ? normCalc(raw, age, edu, sex) : null;
  for (const k of ["total","vs","naming","attention","language","abstract","memory","orientation"]){
    const n = norm ? norm[k] : null;
    h += `<tr><td class="name">${DOM_LABEL[k]}</td><td>${raw[k]} / ${DOM_MAX[k]}</td>
      <td>${n? n.adj.toFixed(2) : "—"}</td>
      <td>${n? (n.pr===null? "N/A（PR<1）" : n.pr) : "—"}</td>
      <td>${n? (n.z===null? "—" : n.z.toFixed(2)) : "—"}</td></tr>`;
  }
  h += `</table>`;
  if (!okDemo) h += `<div class="warnbox">未輸入年齡／教育／性別，無法計算常模——請回封面補填。</div>`;
  h += `<p class="note">校正式（中心化：年齡 68.08、教育 11.19、性別 0.5）與 PR 門檻逐格取自官方常模計算表；「N/A」代表 PR&lt;1。z＝NORM.S.INV(PR/100)。</p>`;
  document.getElementById("resBody").innerHTML = h;

  // [ADDED] v3.0: 靜默自動上傳
  try {
    const exportData = getExportData();
    uploadToGoogleDrive_Silent(JSON.stringify(exportData));
  } catch (e) {
    console.error("Auto upload failed:", e);
  }
}

    <table><tr><th>領域</th><th>原始分數</th><th>校正分數 (Adj)</th><th>百分等級 (PR)</th><th>z 分數</th></tr>${rows}</table>
    ${okDemo? "" : `<p class="rp-notes">※ 未輸入年齡／教育／性別，未計算常模校正。</p>`}
    <div class="rp-draws">${draws}</div>
    <div class="rp-sign"><span>施測人：＿＿＿＿＿＿＿＿</span><span>核閱：＿＿＿＿＿＿＿＿</span></div>
    <div class="rp-notes">常模：Cheng YH, et al. Normative study of the Taiwanese version of the MoCA in community-dwelling individuals in Taiwan. <i>J Chin Med Assoc</i>. 2025;88(8):617-623.（校正式與 PR 對照逐格取自官方常模計算表；「N/A」代表 PR&lt;1；z＝NORM.S.INV(PR/100)）<br>
    MoCA © Z. Nasreddine MD，www.mocatest.org；台灣版譯者：蔡佳芬、傅中玲。本報告由施測輔助網頁產生，僅供臨床參考，不取代完整神經心理評估。</div>`;

  // [MODIFIED] v3.0: 確保圖片加載完才列印
  const images = pr.querySelectorAll("img");
  if (images.length === 0) {
    window.print();
    return;
  }
  let loaded = 0;
  const checkPrint = () => {
    loaded++;
    if (loaded === images.length) {
      window.print();
    }
  };
  images.forEach(img => {
    if (img.complete) {
      checkPrint();
    } else {
      img.onload = checkPrint;
      img.onerror = checkPrint;
    }
  });
}
function getExportData(){
  const d = domains();
  const rawTotal = Object.values(d).reduce((a,b)=>a+b,0);
  const edu = parseFloat(S.demo.edu), age = parseFloat(S.demo.age), sex = parseFloat(S.demo.sex);
  const okDemo = !isNaN(age)&&!isNaN(edu)&&!isNaN(sex);
  const norm = okDemo ? normCalc({ ...d, total: rawTotal }, age, edu, sex) : null;
  const bonus = (!isNaN(edu) && edu<=12 && rawTotal<30) ? 1 : 0;
  
  return {
    tool: "MoCA-T 台語施測教學網頁 v3",
    metadata: {
      exportDate: new Date().toISOString(),
      assessmentDate: new Date().toISOString().slice(0, 10),
      toolVersion: "3.0"
    },
    patientInfo: {
      name: S.demo.name || "",
      chartNumber: S.demo.chartNumber || ("moca_" + (S.demo.name || "case") + "_" + new Date().getTime()),
      age: parseInt(S.demo.age || 0),
      gender: S.demo.sex === "1" ? "男" : "女",
      education: S.demo.edu || "0",
      assessmentDate: new Date().toISOString().slice(0, 10)
    },
    scores: S.scores,
    domains: d,
    results: {
      totalScore: rawTotal,
      educationBonus: bonus,
      adjTotalScore: norm ? parseFloat(norm.total.adj.toFixed(2)) : null,
      totalPR: norm ? norm.total.pr : null,
      totalZ: norm ? (norm.total.z === null ? null : parseFloat(norm.total.z.toFixed(2))) : null,
      domainResults: norm ? norm : null
    },
    drawings: S.draw
  };
}
function exportJSON(){

// [ADDED] v3.0: 靜默上傳 Google Drive / Apps Script
function uploadToGoogleDrive_Silent(jsonData) {
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbw3uS2wMJkXhrRnqrmzYoA_5-DpfHT0atHGZR0203WjDNzkAMpddbdtqXXv8sggWfMq/exec';
  if (typeof jsonData !== 'string' || jsonData.length < 2 || !jsonData.startsWith('{')) {
    console.error('Google Drive Upload Failed: Invalid JSON data string.');
    return;
  }
  fetch(scriptUrl, {
    method: 'POST',
    cache: 'no-cache',
    headers: {
      'Content-Type': 'text/plain;charset=utf-8',
    },
    body: jsonData
  })
  .then(function(response) {
    if (response.ok) return response.json();
    return response.text().then(text => {
      throw new Error('Network response status: ' + response.status + ' Body: ' + text);
    });
  })
  .then(function(result) {
    if (result && result.success) {
      console.log('Google Drive Upload Success:', result.fileName || 'Unknown Filename');
    } else {
      throw new Error(result ? result.message : 'Unknown upload error');
    }
  })
  .catch(function(error) {
    console.error('Google Drive Upload Failed:', error.message);
  });
}

const stage = document.getElementById("stage");
function render(){
  stage.innerHTML = "";
  const p = PAGES[cur];
  const div = document.createElement("div");
  div.className = "page on"; div.innerHTML = p.html;
  stage.appendChild(div); stage.scrollTop = 0;

  stage.querySelectorAll("input[type=checkbox]").forEach(input => {
    const onchangeStr = input.getAttribute("onchange") || "";
    const match = onchangeStr.match(/setScore\('([^']+)'/);

      input.checked = !!S.scores[scoreId];

function endAndClearTest() {

  if (n < 0 || n >= PAGES.length) return;

/* ---------- 交替轉換 ---------- */
const NODES = [
  {t:"1",x:160,y:195,lbl:"開始"},{t:"甲",x:330,y:60},{t:"2",x:425,y:160},{t:"乙",x:300,y:170},
  {t:"3",x:430,y:305},{t:"丙",x:185,y:372},{t:"4",x:262,y:292},{t:"丁",x:88,y:302},
  {t:"5",x:58,y:150},{t:"戊",x:150,y:68,lbl:"終點"}];
const ORDER = ["1","甲","2","乙","3","丙","4","丁","5","戊"];
let tStep = 0, tErr = 0;
function initTrail(){
  tStep = 0; tErr = 0;
  const gN = document.getElementById("trailNodes");
  gN.innerHTML = ""; document.getElementById("trailLines").innerHTML = "";
  NODES.forEach(n => {
    const g = document.createElementNS("http://www.w3.org/2000/svg","g");
    g.innerHTML = `<circle cx="${n.x}" cy="${n.y}" r="26"/><text x="${n.x}" y="${n.y}">${n.t}</text>`+
      (n.lbl? `<text class="lbl" x="${n.x}" y="${n.y+42}">${n.lbl}</text>`:"");
    g.addEventListener("click", () => trailClick(g,n));
    gN.appendChild(g);
  });
}
function trailReset(){ initTrail(); document.getElementById("trailMsg").textContent = "請對「1」開始"; }
function trailClick(g,n){
  if (tStep >= ORDER.length) return;
  const msg = document.getElementById("trailMsg");
  if (n.t === ORDER[tStep]){
    g.classList.add("done");
    if (tStep > 0){
      const p = NODES.find(m => m.t === ORDER[tStep-1]);
      const dx = n.x-p.x, dy = n.y-p.y, dd = Math.hypot(dx,dy);
      const l = document.createElementNS("http://www.w3.org/2000/svg","line");
      l.setAttribute("x1",p.x+dx/dd*28); l.setAttribute("y1",p.y+dy/dd*28);
      l.setAttribute("x2",n.x-dx/dd*30); l.setAttribute("y2",n.y-dy/dd*30);
      document.getElementById("trailLines").appendChild(l);
    }
    tStep++;
    if (tStep === ORDER.length){
      const pass = tErr === 0 ? 1 : 0;
      msg.textContent = pass ? "✔ 完成，全對（自動記 1 分）" : `完成，但有 ${tErr} 次錯誤（0 分）`;
      setScore("trail", pass);
      document.getElementById("trailScoreBox").querySelector("input").checked = !!pass;
    } else {
      const hint = document.getElementById("trailHint")?.checked;
      msg.textContent = hint ? `著！下一个：「${ORDER[tStep]}」` : `進度 ${tStep} / ${ORDER.length}`;
    }
  } else {
    tErr++; g.classList.add("err");
    const hint = document.getElementById("trailHint")?.checked;
    msg.textContent = hint ? `毋著喔，這是「${n.t}」；請揣「${ORDER[tStep]}」（已錯 ${tErr} 次）` : `（記錄錯誤 ${tErr} 次）`;
    setTimeout(() => g.classList.remove("err"), 700);
  }
}

/* ---------- Canvas 手寫（筆畫以邏輯座標保存；每事件即時換算，防偏移） ---------- */
const cvState = {};
S.strokes = S.strokes || {};
function initCanvas(id){
  const cv = document.getElementById(id);
  const cssH = parseInt(cv.getAttribute("height"));
  const st = cvState[id] = { cv, ctx:null, strokes: (S.strokes[id]||[]).slice(), curr:null, cssH };
  function setup(){
    const w = cv.clientWidth || 300;
    cv.width = w * 2; cv.height = cssH * 2; cv.style.height = cssH + "px";
    st.ctx = cv.getContext("2d");
    st.ctx.setTransform(2,0,0,2,0,0);
    st.ctx.lineWidth = 2.5; st.ctx.lineCap = "round"; st.ctx.lineJoin = "round"; st.ctx.strokeStyle = "#1c2b33";
    redraw(id);
    if (st.strokes.length > 0) {
      persist(id);
    }
  }
  setup();
  st.onResize = () => setup();
  window.addEventListener("resize", st.onResize);
  /* 每次事件都重新量測外框並換算成畫布邏輯座標 → 滑鼠/觸控與線條必定對位 */
  const pos = e => {
    const r = cv.getBoundingClientRect();
    return [ (e.clientX - r.left) * (cv.width / 2) / r.width,
             (e.clientY - r.top)  * (cv.height / 2) / r.height ];
  };
  cv.addEventListener("pointerdown", e => { e.preventDefault();
    try { cv.setPointerCapture(e.pointerId); } catch(_) {}
    st.curr = [pos(e)]; });
  cv.addEventListener("pointermove", e => { if (!st.curr) return; e.preventDefault(); st.curr.push(pos(e)); redraw(id); });
  const up = e => { if (!st.curr) return;
    if (st.curr.length > 1) st.strokes.push(st.curr);
    st.curr = null; redraw(id); persist(id); };
  cv.addEventListener("pointerup", up); cv.addEventListener("pointercancel", up);
}
function redraw(id){
  const st = cvState[id], ctx = st.ctx;
  ctx.clearRect(0,0,st.cv.width,st.cv.height);
  const all = st.curr ? [...st.strokes, st.curr] : st.strokes;
  for (const s of all){ ctx.beginPath(); s.forEach((p,i) => i ? ctx.lineTo(p[0],p[1]) : ctx.moveTo(p[0],p[1])); ctx.stroke(); }
}
function persist(id){
  const st = cvState[id];
  S.strokes[id] = st.strokes;
  S.draw[id] = st.strokes.length ? st.cv.toDataURL("image/png") : undefined;
  save();
}
function cvUndo(id){ const st = cvState[id]; st.strokes.pop(); redraw(id); persist(id); }
function cvClear(id){ const st = cvState[id]; st.strokes = []; st.curr = null; redraw(id); persist(id); }

let fluT = 60, fluTimer = null, fluN = 0;
function fluStart(){
  clearInterval(fluTimer); fluT = 60; fluN = 0;
  document.getElementById("fluTally").textContent = 0;
  document.getElementById("fluCount").disabled = false;
  document.getElementById("fluClock").textContent = 60;
  fluTimer = setInterval(() => {
    document.getElementById("fluClock").textContent = --fluT;
    if (fluT <= 0){ clearInterval(fluTimer);
      document.getElementById("fluCount").disabled = true;
      const pass = fluN >= 11 ? 1 : 0;
      setScore("flu", pass);
      document.getElementById("fluScoreBox").querySelector("input").checked = !!pass;
      alert(`時間到：${fluN} 個${pass? "（≥11，自動記 1 分）":"（未達 11 個，0 分）"}`);
    }
  }, 1000);
}
function fluCount(){ document.getElementById("fluTally").textContent = ++fluN; }
function fluReset(){ clearInterval(fluTimer); fluT = 60; fluN = 0;
  document.getElementById("fluClock").textContent = 60;
  document.getElementById("fluTally").textContent = 0;
  document.getElementById("fluCount").disabled = true; }
