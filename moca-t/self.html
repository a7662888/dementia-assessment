<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MoCA 台灣版｜受測者自助施測</title>
<style>
  :root{--ink:#1c2b33;--paper:#faf9f6;--card:#fff;--line:#e3ded4;--accent:#0f766e;
        --accent-soft:#e6f2f0;--muted:#6b7280;--warn:#b45309;--err:#c0392b;--rec:#d92d20;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--paper);color:var(--ink);
       display:flex;flex-direction:column;overflow:hidden;}
  .top{background:var(--ink);color:#e8e4da;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .top .t{font-weight:700;font-size:.95rem;}
  .top .bar{flex:1;height:6px;background:#3a4c55;border-radius:3px;overflow:hidden;}
  .top .bar i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s;}
  #stage{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .page{max-width:720px;margin:0 auto;padding:26px 18px 40px;animation:fade .25s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  h2{font-size:1.5rem;color:var(--accent);margin-bottom:10px;}
  .bigtext{font-size:1.35rem;line-height:2;margin:14px 0;}
  .note{font-size:.95rem;color:var(--muted);margin:10px 0;}
  .bigbtn{display:block;width:100%;margin:20px 0 0;padding:20px;font-size:1.5rem;font-weight:700;
          background:var(--accent);color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;}
  .bigbtn.gray{background:#8a938f;}
  .bigbtn:disabled{opacity:.45;}
  .bigbtn.rec{background:var(--rec);}
  .langbtn{display:block;width:100%;margin:14px 0;padding:26px;font-size:1.7rem;font-weight:700;
           background:#fff;color:var(--accent);border:3px solid var(--accent);border-radius:14px;cursor:pointer;font-family:inherit;}
  .statusbox{display:flex;flex-direction:column;align-items:center;gap:14px;margin:30px 0;}
  .bigicon{font-size:4.5rem;}
  .pulse{animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .recdot{width:22px;height:22px;border-radius:50%;background:var(--rec);display:inline-block;margin-right:8px;}
  .countdown{font-size:3.2rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;}
  .form label{display:block;margin:14px 0 4px;font-weight:700;font-size:1.05rem;}
  .form input,.form select{width:100%;padding:14px;font-size:1.15rem;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:#fff;}
  .form .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .canv{border:2px solid var(--line);border-radius:8px;background:#fff;touch-action:none;display:block;width:100%;}
  .canvbar{display:flex;gap:10px;margin:10px 0;}
  .canvbar button{border:1px solid var(--muted);background:#fff;border-radius:8px;padding:12px 20px;font-size:1.05rem;cursor:pointer;font-family:inherit;}
  .refimg{text-align:center;margin:8px 0;}
  .animalimg{display:block;max-width:78%;max-height:34vh;margin:10px auto;border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px;}
  /* trail */
  #trailSvg{width:100%;max-width:560px;display:block;margin:8px auto;touch-action:manipulation;}
  #trailSvg circle{fill:#fff;stroke:var(--ink);stroke-width:3;cursor:pointer;}
  #trailSvg g.done circle{fill:var(--accent-soft);stroke:var(--accent);}
  #trailSvg g.err circle{stroke:var(--err);fill:#fdeceb;}
  #trailSvg text{font-size:24px;font-weight:700;text-anchor:middle;dominant-baseline:central;pointer-events:none;}
  #trailSvg .lbl{font-size:14px;fill:var(--muted);font-weight:400;}
  #trailSvg line{stroke:var(--accent);stroke-width:3;stroke-dasharray:6 5;}
  /* vigilance */
  .vigbtn{display:block;width:82%;margin:26px auto;padding:60px 20px;font-size:2.2rem;font-weight:700;
          background:#fff;color:var(--accent);border:5px solid var(--accent);border-radius:20px;cursor:pointer;font-family:inherit;}
  .vigbtn:active{background:var(--accent-soft);}
  /* staff */
  table.simple{border-collapse:collapse;width:100%;margin:10px 0;font-size:.9rem;background:#fff;}
  table.simple th,table.simple td{border:1px solid var(--line);padding:6px 8px;text-align:center;}
  table.simple th{background:var(--accent-soft);color:var(--accent);}
  table.simple td.name{text-align:left;font-weight:700;}
  .sitem{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:10px 0;}
  .sitem h4{color:var(--accent);margin-bottom:6px;font-size:1rem;}
  .sitem audio{width:100%;margin:4px 0;}
  .sitem label{display:flex;align-items:center;gap:8px;padding:5px 2px;font-size:.95rem;cursor:pointer;}
  .sitem input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);}
  .sitem input[type=number]{width:6em;padding:6px;font-size:1rem;border:1px solid var(--line);border-radius:6px;}
  .drawimg{max-width:300px;border:1px solid var(--line);border-radius:6px;background:#fff;}
  .warnbox{background:#fdf6ec;border:1px solid #ecd9b0;border-radius:8px;padding:10px 14px;font-size:.85rem;color:var(--warn);margin:12px 0;}
  .got{font-weight:700;color:var(--accent);}
  /* 列印報告（沿用施測者版樣式） */
  #printReport{display:none;}
  @media print{
    body > *:not(#printReport){display:none !important;}
    body{overflow:visible;display:block;background:#fff;}
    #printReport{display:block !important;font-size:11pt;color:#1c2b33;}
  }
  #printReport .rp-head{border-bottom:3px solid var(--accent);padding-bottom:8px;margin-bottom:12px;}
  #printReport h1{font-size:16pt;color:var(--accent);}
  #printReport table{border-collapse:collapse;width:100%;margin:8px 0;font-size:10pt;}
  #printReport th,#printReport td{border:1px solid #bbb;padding:4px 8px;text-align:center;}
  #printReport th{background:#e6f2f0;color:#0f766e;}
  #printReport td.name{text-align:left;font-weight:700;}
  #printReport .rp-draws{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0;}
  #printReport .rp-draws img{width:250px;background:#fff;border:1px solid #bbb;}
  #printReport .rp-notes{font-size:9pt;color:#555;margin-top:10px;border-top:1px solid #bbb;padding-top:6px;line-height:1.7;}
</style>
</head>

/* ================= 語音資源 =================
   台語沿用施測者版音檔；國語在 audio/guo/。id 需要語言別名時列在 map。 */
const AUD = {
  tai: { base: "audio/", map: {
    intro: "intro_self", serial7: "serial7_self", vigilance: "vigilance_self", done: "done_self",
    abs_ex: "abs_ex1", abs_ans: "abs_ex3",
    stim_words: "mem_words", stim_fwd: "digits_fwd", stim_bwd: "digits_bwd", stim_vig: "vigilance_seq",
  }, chains: { trail: ["trail", "trail_supp"], ori_time: ["ori_date", "ori_hint"],
               fluency: ["fluency_prompt", "fluency_topic"] } },
  guo: { base: "audio/guo/", map: {
    stim_words: "mem_words", stim_fwd: "digits_fwd_seq", stim_bwd: "digits_bwd_seq", stim_vig: "vigilance_seq",
  }, chains: {} },
};
let L = "tai";
function urlOf(id){
  const a = AUD[L];
  if (id === "beep") return "audio/beep.mp3";
  if (id === "stop") return "audio/stop.mp3";
  return a.base + (a.map[id] || id) + ".mp3";
}
function clipList(id){
  const c = AUD[L].chains[id];
  return (c ? c : [id]).map(urlOf);
}

const speaker = document.getElementById("speaker");

function playChain(urls, onDone){
  chainQueue = urls.slice(); chainDone = onDone || null;
  nextInChain();
}

  if (!chainQueue.length){ if (chainDone) { const f = chainDone; chainDone = null; f(); } return; }
  speaker.src = chainQueue.shift();
  speaker.playbackRate = 1;
  speaker.play().catch(()=>{ /* 極端情況：播放被擋，顯示手動鈕 */ showManualPlay(); });
}

  const el = document.getElementById("manualPlay");

let micOK = false, micStream = null, recorder = null, recChunks = [];

async function ensureMic(){
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micOK = true;
  } catch (e) { micOK = false; }
  return micOK;
}
function startRec(recId){
  if (!micOK) return false;
  recChunks = [];
  recorder = new MediaRecorder(micStream);
  recorder.ondataavailable = e => recChunks.push(e.data);
  recorder.onstop = () => { REC[recId] = URL.createObjectURL(new Blob(recChunks, { type: recorder.mimeType })); };
  recorder.start();
  return true;
}
function stopRec(){ if (recorder && recorder.state !== "inactive") recorder.stop(); }

let recCdTimer = null;
function beginRec(el, recId, maxSec){
  const lb = el.querySelector("#listenBox"); if (lb) lb.style.display = "none";
  const rb = el.querySelector("#recBox"); if (rb) rb.style.display = "flex";
  const btn = el.querySelector("#btnDone");

  let t = maxSec;
  const cd = el.querySelector("#recCd");
  if (cd) cd.textContent = t;
  recCdTimer = setInterval(() => {
    t--;
    if (cd) cd.textContent = t;
    if (t <= 0){ clearInterval(recCdTimer); stopRec(); next(); }
  }, 1000);
  if (btn){
    btn.style.display = "block";
    btn.onclick = () => { clearInterval(recCdTimer); stopRec(); next(); };

}

/* ================= 交替轉換 ================= */
const NODES = [
  {t:"1",x:160,y:195,lbl:"開始"},{t:"甲",x:330,y:60},{t:"2",x:425,y:160},{t:"乙",x:300,y:170},
  {t:"3",x:430,y:305},{t:"丙",x:185,y:372},{t:"4",x:262,y:292},{t:"丁",x:88,y:302},
  {t:"5",x:58,y:150},{t:"戊",x:150,y:68,lbl:"終點"}];
const ORDER = ["1","甲","2","乙","3","丙","4","丁","5","戊"];
let tStep = 0, tErr = 0;
function initTrail(el){
  tStep = 0; tErr = 0;
  const gN = el.querySelector("#trailNodes");
  NODES.forEach(n => {
    const g = document.createElementNS("http://www.w3.org/2000/svg","g");
    g.innerHTML = `<circle cx="${n.x}" cy="${n.y}" r="27"/><text x="${n.x}" y="${n.y}">${n.t}</text>`+
      (n.lbl? `<text class="lbl" x="${n.x}" y="${n.y+44}">${n.lbl}</text>`:"");
    g.addEventListener("click", () => {
      if (tStep >= ORDER.length) return;
      if (n.t === ORDER[tStep]){
        g.classList.add("done");
        if (tStep > 0){
          const p = NODES.find(m => m.t === ORDER[tStep-1]);
          const l = document.createElementNS("http://www.w3.org/2000/svg","line");
          const dx=n.x-p.x, dy=n.y-p.y, dd=Math.hypot(dx,dy);
          l.setAttribute("x1",p.x+dx/dd*29); l.setAttribute("y1",p.y+dy/dd*29);
          l.setAttribute("x2",n.x-dx/dd*29); l.setAttribute("y2",n.y-dy/dd*29);
          el.querySelector("#trailLines").appendChild(l);
        }
        tStep++;
        if (tStep === ORDER.length){
          S.auto.trail = { errors: tErr };
          S.scores.trail = tErr === 0 ? 1 : 0;
          setTimeout(next, 1200);
        }
      } else {
        tErr++; g.classList.add("err");
        setTimeout(() => g.classList.remove("err"), 600);
      }
    });
    gN.appendChild(g);
  });
}

/* ================= Canvas（逐事件座標換算） ================= */
const cvState = {};
function initCanvas(id){
  const cv = document.getElementById(id);
  const cssH = parseInt(cv.getAttribute("height"));
  const st = cvState[id] = { cv, ctx:null, strokes:(S.strokes[id]||[]).slice(), curr:null };
  function setup(){
    const w = cv.clientWidth || 300;
    cv.width = w*2; cv.height = cssH*2; cv.style.height = cssH+"px";
    st.ctx = cv.getContext("2d");
    st.ctx.setTransform(2,0,0,2,0,0);
    st.ctx.lineWidth = 2.5; st.ctx.lineCap = "round"; st.ctx.lineJoin = "round"; st.ctx.strokeStyle = "#1c2b33";
    redraw(id);
  }
  setup();
  window.addEventListener("resize", setup);
  const pos = e => { const r = cv.getBoundingClientRect();
    return [(e.clientX-r.left)*(cv.width/2)/r.width, (e.clientY-r.top)*(cv.height/2)/r.height]; };
  cv.addEventListener("pointerdown", e => { e.preventDefault();
    try{ cv.setPointerCapture(e.pointerId); }catch(_){}
    st.curr = [pos(e)]; });
  cv.addEventListener("pointermove", e => { if (!st.curr) return; e.preventDefault(); st.curr.push(pos(e)); redraw(id); });
  const up = () => { if (!st.curr) return;
    if (st.curr.length > 1) st.strokes.push(st.curr);
    st.curr = null; redraw(id);
    S.strokes[id] = st.strokes;
    S.draw[id] = st.strokes.length ? st.cv.toDataURL("image/png") : undefined; };
  cv.addEventListener("pointerup", up); cv.addEventListener("pointercancel", up);
}
function redraw(id){
  const st = cvState[id], ctx = st.ctx;
  ctx.clearRect(0,0,st.cv.width,st.cv.height);
  const all = st.curr ? [...st.strokes, st.curr] : st.strokes;
  for (const s of all){ ctx.beginPath(); s.forEach((p,i)=> i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])); ctx.stroke(); }
}
function cvUndo(id){ const st=cvState[id]; st.strokes.pop(); redraw(id);
  S.strokes[id]=st.strokes; S.draw[id]=st.strokes.length? st.cv.toDataURL("image/png"):undefined; }
function cvClear(id){ const st=cvState[id]; st.strokes=[]; st.curr=null; redraw(id);
  S.strokes[id]=[]; delete S.draw[id]; }

/* ================= 常模（與施測者版同一套，已逐格對過官方計算表） ================= */
function normInv(p){
  if (p<=0||p>=1) return NaN;
  const a=[-39.69683028665376,220.9460984245205,-275.9285104469687,138.3577518672690,-30.66479806614716,2.506628277459239],
        b=[-54.47609879822406,161.5858368580409,-155.6989798598866,66.80131188771972,-13.28068155288572],
        c=[-0.007784894002430293,-0.3223964580411365,-2.400758277161838,-2.549732539343734,4.374664141464968,2.938163982698783],
        d=[0.007784695709041462,0.3224671290700398,2.445134137142996,3.754408661907416], pl=0.02425;
  let q,r;
  if(p<pl){ q=Math.sqrt(-2*Math.log(p));
    return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
  if(p<=1-pl){ q=p-0.5; r=q*q;
    return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
  q=Math.sqrt(-2*Math.log(1-p));
  return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}
function lookupPR(adj, key){
  const th = NORM.thresholds[key], pr = NORM.percentile;
  let ans = null;
  for (let i=0;i<th.length;i++){ if (th[i] <= adj) ans = pr[i]; else break; }
  return ans;
}
function normCalc(raw, age, edu, sex){
  const A=age-68.08, E=edu-11.19, G=sex-0.5;
  const adj = {
    total: raw.total+0.09*A-0.142*E, vs: raw.vs-0.081*G+0.019*A-0.034*E,
    naming: raw.naming-0.109*G+0.007*A-0.023*E, attention: raw.attention+0.014*A-0.022*E,
    language: raw.language+0.116*G+0.019*A-0.035*E, abstract: raw.abstract-0.096*A-0.044*E,
    memory: raw.memory+0.028*A-0.028*E, orientation: raw.orientation+0.005*A-0.008*E };
  const out = {};
  for (const k in adj){
    const pr = lookupPR(adj[k], k);
    out[k] = { adj: adj[k], pr, z: pr===null? null : normInv(pr/100) };
  }
  return out;
}
const DOM_LABEL = { total:"總分", vs:"視覺空間/執行", naming:"命名", attention:"專注力",
                    language:"語言", abstract:"抽象概念", memory:"延遲記憶", orientation:"定向" };
const DOM_MAX = { total:30, vs:5, naming:3, attention:6, language:3, abstract:2, memory:5, orientation:6 };

/* ================= 工作人員評分頁 ================= */
function scb(id, text){
  const ck = S.scores[id] ? "checked" : "";
  return `<label><input type="checkbox" ${ck} onchange="S.scores['${id}']=this.checked?1:0">${text}</label>`;
}
function player(recId, label){
  return REC[recId]
    ? `<div><span class="note">${label}</span><audio controls src="${REC[recId]}"></audio></div>`
    : `<div class="note">${label}：（無錄音——請依現場觀察評分）</div>`;
}

    <div class="warnbox">⚠️ 錄音只存在本頁記憶體——評分完成、下載報告之前，請勿關閉或重新整理此分頁。</div>

    <div class="sitem"><h4>4. 命名</h4>
      ${player("rec_naming_1","動物一（正解：獅子）")}${scb("name_lion","答對：獅子")}

    <div class="sitem"><h4>5. 記憶登錄（不計分，臨床參考）</h4>

    <div class="sitem"><h4>7. 警覺性（自動）</h4>
      <p>命中 ${S.auto.vig? S.auto.vig.hits : "—"} / ${S.auto.vig? S.auto.vig.total : 11}，誤按 ${S.auto.vig? S.auto.vig.fa : "—"}，錯誤合計 ${S.auto.vig? S.auto.vig.errors : "—"}</p>

      ${player("rec_serial7","作答錄音（正解 93 86 79 72 65）")}

    <div class="sitem"><h4>13. 定向</h4>
      ${player("rec_ori_time","時間（年/月/日/星期）")}

      ${player("rec_ori_place","地點/城市")}
      ${scb("or_5","地點")}${scb("or_6","城市")}</div>

    <button class="bigbtn" onclick="showResult()">計算結果與常模 ▼</button>
    <div id="resBody"></div>
    <div class="canvbar" style="margin-top:10px">
      <button onclick="printPDF()">下載 PDF 報告（含手繪圖）</button>

    <p class="note">MoCA © Z. Nasreddine MD，www.mocatest.org；台灣版譯者：蔡佳芬、傅中玲。自助版為適應性施測（敲桌改按鈕、口語作答錄音後評分），結果解讀請留意與標準施測之差異；台語語音為 AI 合成，正式使用前須母語者審聽。</p>`;
}
function domains(){
  const s = S.scores, sum = ids => ids.reduce((a,i)=>a+(s[i]||0),0);
  const s7n = sum(["s7_1","s7_2","s7_3","s7_4","s7_5"]);
  return {
    vs: (s.trail||0) + (sum(["cube_c1","cube_c2","cube_c3","cube_c4"])===4?1:0) + sum(["clock_contour","clock_num","clock_hand"]),
    naming: sum(["name_lion","name_rhino","name_camel"]),
    attention: sum(["att_fwd","att_bwd","att_vig"]) + (s7n>=4?3:s7n>=2?2:s7n>=1?1:0),
    language: sum(["rep_1","rep_2","flu"]),
    abstract: sum(["abs_1","abs_2"]),
    memory: sum(["rc_1","rc_2","rc_3","rc_4","rc_5"]),
    orientation: sum(["or_1","or_2","or_3","or_4","or_5","or_6"]),
  };
}
let lastNorm = null;
function showResult(){
  const d = domains();
  const raw = {...d, total: Object.values(d).reduce((a,b)=>a+b,0)};
  const age=parseFloat(S.demo.age), edu=parseFloat(S.demo.edu), sex=parseFloat(S.demo.sex);
  const ok = !isNaN(age)&&!isNaN(edu)&&!isNaN(sex);
  lastNorm = ok? normCalc(raw, age, edu, sex) : null;
  const bonus = (!isNaN(edu)&&edu<=12&&raw.total<30)?1:0;
  let h = `<p class="bigtext" style="font-size:1.1rem">原始總分 <span class="got">${raw.total} / 30</span>
    ${bonus? `（教育≤12 年傳統判讀＋1＝${raw.total+1}；臨界值 ≥26）`:``}</p>
    <table class="simple"><tr><th>領域</th><th>原始</th><th>Adj</th><th>PR</th><th>z</th></tr>`;
  for (const k of ["total","vs","naming","attention","language","abstract","memory","orientation"]){
    const n = lastNorm? lastNorm[k] : null;
    h += `<tr><td class="name">${DOM_LABEL[k]}</td><td>${raw[k]} / ${DOM_MAX[k]}</td>
      <td>${n? n.adj.toFixed(2):"—"}</td><td>${n? (n.pr===null?"N/A":n.pr):"—"}</td>
      <td>${n? (n.z===null?"—":n.z.toFixed(2)):"—"}</td></tr>`;
  }
  h += `</table><p class="note">常模：Cheng YH, et al. J Chin Med Assoc 2025;88(8):617-623（逐格取自官方計算表）。</p>`;
  document.getElementById("resBody").innerHTML = h;
}
function getExportData(){
  const d = domains();
  const rawTotal = Object.values(d).reduce((a,b)=>a+b,0);
  const edu=parseFloat(S.demo.edu), age=parseFloat(S.demo.age), sex=parseFloat(S.demo.sex);
  const ok = !isNaN(age)&&!isNaN(edu)&&!isNaN(sex);
  const norm = ok? normCalc({...d, total: rawTotal}, age, edu, sex) : null;
  const bonus = (!isNaN(edu)&&edu<=12&&rawTotal<30)?1:0;
  return {
    tool: "MoCA-T 受測者自助版 v1",
    metadata: { exportDate: new Date().toISOString(), assessmentDate: new Date().toISOString().slice(0,10),
                toolVersion: "self-1.0", language: S.lang },
    patientInfo: { name: S.demo.name||"", chartNumber: S.demo.chartNumber || ("moca_self_"+new Date().getTime()),
                   age: parseInt(S.demo.age||0), gender: S.demo.sex==="1"?"男":"女",
                   education: S.demo.edu||"0", assessmentDate: new Date().toISOString().slice(0,10) },
    scores: S.scores, domains: d, auto: S.auto,
    results: { totalScore: rawTotal, educationBonus: bonus,
      adjTotalScore: norm? parseFloat(norm.total.adj.toFixed(2)) : null,
      totalPR: norm? norm.total.pr : null,
      totalZ: norm? (norm.total.z===null? null : parseFloat(norm.total.z.toFixed(2))) : null,
      domainResults: norm },
    drawings: S.draw,
  };
}
function exportJSON(){
  const data = getExportData();
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));
  a.download = `MoCA-T_self_${data.patientInfo.name||"case"}_${data.patientInfo.chartNumber}.json`;
  a.click();
}
function uploadNow(btn){
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbw3uS2wMJkXhrRnqrmzYoA_5-DpfHT0atHGZR0203WjDNzkAMpddbdtqXXv8sggWfMq/exec';
  const data = getExportData();
  data.drawings = {};
  btn.textContent = "上傳中…"; btn.disabled = true;
  fetch(scriptUrl, { method:"POST", cache:"no-cache",
    headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(data) })
    .then(r => r.json()).then(j => { btn.textContent = j.success? "✔ 已上傳" : "上傳失敗"; })
    .catch(() => { btn.textContent = "上傳失敗（可稍後重試）"; btn.disabled = false; });
}
function printPDF(){
  const d = domains();
  const raw = {...d, total: Object.values(d).reduce((a,b)=>a+b,0)};
  const age=parseFloat(S.demo.age), edu=parseFloat(S.demo.edu), sex=parseFloat(S.demo.sex);
  const ok = !isNaN(age)&&!isNaN(edu)&&!isNaN(sex);
  const norm = ok? normCalc(raw, age, edu, sex) : null;
  const bonus = (!isNaN(edu)&&edu<=12&&raw.total<30)?1:0;
  let rows = "";
  for (const k of ["total","vs","naming","attention","language","abstract","memory","orientation"]){
    const n = norm? norm[k] : null;
    rows += `<tr><td class="name">${DOM_LABEL[k]}</td><td>${raw[k]} / ${DOM_MAX[k]}</td>
      <td>${n? n.adj.toFixed(2):"—"}</td><td>${n? (n.pr===null?"N/A（PR<1）":n.pr):"—"}</td>
      <td>${n? (n.z===null?"—":n.z.toFixed(2)):"—"}</td></tr>`;
  }
  let draws = "";
  if (S.draw.cvCube)  draws += `<figure><img src="${S.draw.cvCube}"><figcaption>立方體複製（受測者手繪）</figcaption></figure>`;
  if (S.draw.cvClock) draws += `<figure><img src="${S.draw.cvClock}"><figcaption>畫時鐘 11:10（受測者手繪）</figcaption></figure>`;
  if (!draws) draws = `<p class="rp-notes">（本次無手繪紀錄）</p>`;
  let pr = document.getElementById("printReport");
  if (!pr){ pr = document.createElement("div"); pr.id = "printReport"; document.body.appendChild(pr); }
  pr.innerHTML = `
    <div class="rp-head"><h1>蒙特利爾認知評估（台灣版）評估報告——受測者自助版</h1>
      <div style="font-size:9pt;color:#555">MoCA-T Self-administered｜施測語言：${S.lang==="tai"?"台語":"國語"}</div></div>
    <div style="display:flex;gap:22px;flex-wrap:wrap;font-size:10.5pt;margin:10px 0">
      <span>姓名／代號：<b>${S.demo.name||"　　　"}</b></span><span>病歷號：<b>${S.demo.chartNumber||"—"}</b></span>
      <span>年齡：<b>${S.demo.age||"—"}</b></span><span>性別：<b>${S.demo.sex==="1"?"男":"女"}</b></span>
      <span>教育年數：<b>${S.demo.edu||"—"}</b></span><span>評估日期：<b>${new Date().toLocaleDateString("zh-TW")}</b></span></div>
    <div style="font-size:13pt;margin:8px 0">原始總分 <b style="font-size:16pt;color:#0f766e">${raw.total} / 30</b>
      ${bonus? `（教育≤12 年，傳統判讀加 1 分＝${raw.total+1}；臨界值 ≥26）`:`（傳統臨界值 ≥26）`}</div>
    <table><tr><th>領域</th><th>原始分數</th><th>校正分數 (Adj)</th><th>百分等級 (PR)</th><th>z 分數</th></tr>${rows}</table>
    <div class="rp-draws">${draws}</div>
    <div style="margin-top:20px;font-size:10.5pt;display:flex;gap:60px"><span>評分人：＿＿＿＿＿＿＿＿</span><span>核閱：＿＿＿＿＿＿＿＿</span></div>
    <div class="rp-notes">本測驗以自助模式進行（語音導引、口語作答錄音後由工作人員評分；警覺性以按鈕替代敲桌、交替轉換以觸控點選替代畫線），
    結果解讀請留意與標準施測之差異。常模：Cheng YH, et al. <i>J Chin Med Assoc</i>. 2025;88(8):617-623。
    MoCA © Z. Nasreddine MD，www.mocatest.org；台灣版譯者：蔡佳芬、傅中玲。</div>`;
  const imgs = pr.querySelectorAll("img");
  if (!imgs.length){ window.print(); return; }
  let n = 0;
  const chk = () => { if (++n === imgs.length) window.print(); };
  imgs.forEach(im => im.complete ? chk() : (im.onload = chk, im.onerror = chk));
}

render();
</script>
